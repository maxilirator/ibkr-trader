# Prevent unattended-upgrades/needrestart from hard-restarting IB Gateway.
#
# A normal systemctl restart does not create IBC's autorestart handoff file, so
# the next Gateway start requires full IBKR authentication and may trigger 2FA.
# Let the repo watchdog handle Gateway recovery through the IBC CommandServer.
$nrconf{override_rc}->{qr(^ibgateway-ibc\.service$)} = 0;
